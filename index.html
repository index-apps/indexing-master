<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Indexing Updates</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        #posts { margin-top: 20px; }
        .post-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .post-title { font-size: 1.2em; font-weight: bold; color: #2980b9; margin-bottom: 5px; }
        .post-url { color: #7f8c8d; word-break: break-all; font-size: 0.9em; }
        .date { font-size: 0.8em; color: #bdc3c7; }
    </style>
</head>
<body>

    <h1>Global Indexing Feed</h1>
    <div id="posts">Loading latest posts...</div>

    <script>
        // আপনার সুপাবেস তথ্য এখানে দিন (এগুলো পাবলিকলি দিলে সমস্যা নেই কারণ আমরা শুধু সিলেক্ট পারমিশন দেব)
        const SB_URL = 'https://seahqhzosfsrwwwehnmq.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlYWhxaHpvc2Zzcnd3d2Vobm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjY2MzQsImV4cCI6MjA5NDM0MjYzNH0.XcOmf5HETqLDYTn6JmjYMX-W45mRA8hidiZTZlH7Ipo';

        async function fetchPosts() {
            try {
                const response = await fetch(`${SB_URL}/rest/v1/posts?select=*&order=created_at.desc&limit=50`, {
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`
                    }
                });
                const data = await response.json();
                const container = document.getElementById('posts');
                
                if (data.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">No posts found yet.</p>';
                    return;
                }

                container.innerHTML = data.map(post => `
                    <div class="post-card">
                        <div class="post-title">${post.title || 'No Title'}</div>
                        <div class="post-url"><a href="${post.url}" target="_blank">${post.url}</a></div>
                        <div class="date">${new Date(post.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('posts').innerHTML = 'Failed to load posts.';
            }
        }

        fetchPosts();
    </script>
</body>
</html>
